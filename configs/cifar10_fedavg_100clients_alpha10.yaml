# FedAvg Baseline | CIFAR10 | 100 Clients | Non-IID a=1.0
experiment:
  name: "fedavg_cifar10_100clients_alpha10"
  algorithm: "fedavg"
  seed: 42

dataset:
  name: "cifar10"
  partition: "noniid_dirichlet"
  dirichlet_alpha: 1.0
  num_classes: 10

federation:
  num_clients: 100
  fraction_fit: 0.5
  fraction_evaluate: 0.5
  num_rounds: 100
  local_epochs: 5
  batch_size: 32

model:
  architecture: "resnet18"

optimizer:
  name: "sgd"
  lr: 0.01
  momentum: 0.9
  weight_decay: 1.0e-4

fedprox:
  mu: 0.1
scaffold:
  global_lr: 1.0
fednova:
  rho: 0.0
moon:
  temperature: 0.5
  mu: 1.0

logging:
  save_results: true
  results_dir: "results"
  log_every_round: 1
