# FedAvg Baseline | MNIST | 50 Clients | Non-IID a=0.5
experiment:
  name: "fedavg_mnist_50clients_alpha05"
  algorithm: "fedavg"
  seed: 42

dataset:
  name: "mnist"
  partition: "noniid_dirichlet"
  dirichlet_alpha: 0.5
  num_classes: 10

federation:
  num_clients: 50
  fraction_fit: 0.5
  fraction_evaluate: 0.5
  num_rounds: 100
  local_epochs: 5
  batch_size: 32

model:
  architecture: "lenet"

optimizer:
  name: "sgd"
  lr: 0.01
  momentum: 0.9
  weight_decay: 1.0e-4

fedprox:
  mu: 0.1
scaffold:
  global_lr: 1.0
fednova:
  rho: 0.0
moon:
  temperature: 0.5
  mu: 1.0

logging:
  save_results: true
  results_dir: "results"
  log_every_round: 1
