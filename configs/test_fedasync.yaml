# TEST CONFIG — FedAsync quick test (5 rounds, 10 clients, MNIST)
# Run: python main_no_ray.py --config configs/test_fedasync.yaml
#
# Paper: Xie, Koyejo, Gupta. "Asynchronous Federated Optimization". arXiv:1903.03934
# Key idea: Server updates immediately on each client response.
#           Stale updates are downweighted by staleness function.

experiment:
  name: "test_fedasync_mnist_10clients_iid"
  algorithm: "fedasync"
  seed: 42

dataset:
  name: "mnist"
  partition: "iid"
  dirichlet_alpha: null
  num_classes: 10

federation:
  num_clients: 10
  fraction_fit: 0.5
  fraction_evaluate: 0.5
  num_rounds: 5
  local_epochs: 2
  batch_size: 32

model:
  architecture: "lenet"

optimizer:
  name: "sgd"
  lr: 0.01
  momentum: 0.9
  weight_decay: 1.0e-4

# FedAsync specific hyperparameters (Section 5 of paper)
fedasync:
  mixing_rate: 0.1             # alpha — controls global update step size
  staleness_fn: "polynomial"   # "constant" | "polynomial" | "hinge"
  staleness_a: 0.5             # exponent for polynomial / hinge
  staleness_b: 4               # hinge threshold (only used if staleness_fn=hinge)
  steps_per_round: 10          # async steps per logging round
  speed_distribution: "heterogeneous"   # "uniform" | "heterogeneous"
  straggler_threshold: 0.5     # compute_speed below this = straggler

logging:
  save_results: true
  results_dir: "results"
  log_every_round: 1
