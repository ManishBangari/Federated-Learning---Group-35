# TEST CONFIG — FedCS quick test (5 rounds, 10 clients, MNIST)
# Run: python main_no_ray.py --config configs/test_fedcs.yaml
#
# Paper: Nishio & Yonetani. "Client Selection for FL with Heterogeneous
#        Resources in Mobile Edge". IEEE ICC 2019. arXiv:1804.08333
# Key idea: Select clients by resource capability + round deadline.
#           Greedily maximise clients that can finish within T_round.

experiment:
  name: "test_fedcs_mnist_10clients_iid"
  algorithm: "fedcs"
  seed: 42

dataset:
  name: "mnist"
  partition: "iid"
  dirichlet_alpha: null
  num_classes: 10

federation:
  num_clients: 10
  fraction_fit: 0.5
  fraction_evaluate: 0.5
  num_rounds: 5
  local_epochs: 2
  batch_size: 32

model:
  architecture: "lenet"

optimizer:
  name: "sgd"
  lr: 0.01
  momentum: 0.9
  weight_decay: 1.0e-4

# FedCS specific hyperparameters (Algorithm 2 of paper)
fedcs:
  t_round: 500.0              # T_round deadline (simulated seconds)
                              # clients whose estimated_time > t_round are excluded
  request_fraction: 0.8       # fraction of clients asked for resource info
  speed_distribution: "heterogeneous"  # "uniform" | "heterogeneous"
  straggler_threshold: 200.0  # estimated_time above this = straggler

logging:
  save_results: true
  results_dir: "results"
  log_every_round: 1
